name: CI/CD Pipeline — ACEest Fitness & Gym

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Build & Lint
  # ──────────────────────────────────────────────
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          # Fail on syntax errors or undefined names; warn on style
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 app.py --count --max-line-length=100 --statistics

  # ──────────────────────────────────────────────
  # JOB 2: Docker Image Assembly
  # ──────────────────────────────────────────────
  docker-build:
    name: Docker Image Assembly
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t acefitness:${{ github.sha }} .

      - name: Verify image was built
        run: docker image inspect acefitness:${{ github.sha }}

  # ──────────────────────────────────────────────
  # JOB 3: Automated Testing inside container
  # ──────────────────────────────────────────────
  automated-tests:
    name: Automated Testing
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build test image (includes test files)
        run: |
          docker build \
            --build-arg INCLUDE_TESTS=true \
            -t acefitness-test:${{ github.sha }} \
            -f Dockerfile.test .

      - name: Run Pytest inside container
        run: |
          docker run --rm acefitness-test:${{ github.sha }} \
            pytest test_app.py -v --tb=short

      - name: Upload coverage report (optional)
        if: always()
        run: |
          docker run --rm acefitness-test:${{ github.sha }} \
            pytest test_app.py --cov=app --cov-report=term-missing || true
